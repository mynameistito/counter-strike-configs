// Binds

bind "0" "slot10"                          // 0 - Select Molotov/Incendiary
bind "1" "slot1"                           // 1 - Primary Weapon
bind "2" "slot2"                           // 2 - Secondary Weapon
bind "3" "slot3"                           // 3 - Knife/Melee
bind "4" "slot4"                           // 4 - Cycle Grenades
bind "5" "slot5"                           // 5 - C4 Explosive
bind "6" "slot6"                           // 6 - HE Grenade
bind "7" "slot7"                           // 7 - Flashbang
bind "8" "slot8"                           // 8 - Smoke Grenade
bind "9" "slot9"                           // 9 - Decoy Grenade
bind "a" "+moveleft"                       // a - Move Left
bind "b" "sm_b"                            // b - Custom Alias (sm_b)
bind "c" "sm_startpos"                     // c - Surf Start Pos
bind "d" "+moveright"                      // d - Move Right
bind "e" "+use"                            // e - Use/Interact
bind "f" "+lookatweapon"                   // f - Inspect Weapon
bind "g" "drop"                            // g - Drop Weapon
bind "h" "sm_hide"                         // h - Custom Alias (sm_hide)
bind "i" "show_loadout_toggle"             // i - Toggle Loadout Display
bind "k" "sm_keys"                         // k - Custom Alias (sm_keys)
bind "m" "chooseteam"                      // m - Select Team
bind "n" "say n1"                          // n - Say n1
bind "o" "+left"                           // o - Turn Left
bind "p" "+right"                          // p - Turn Right
bind "q" "sm_end"                          // q - Custom Alias (sm_end)
bind "r" "sm_r"                           // r - Custom Alias (sm_rs)
bind "s" "+back"                           // s - Move Backward
bind "t" "sm_r"                            // t - Custom Alias (sm_r)
bind "u" "messagemode2"                    // u - Team Chat
bind "v" "+voicerecord"                    // v - Voice Record
bind "w" "+forward"                        // w - Move Forward
bind "x" "slot12"                          // x - Healthshot/Special
bind "y" "sm_nc"                           // y - Custom Alias (sm_nc)
bind "z" "sm_rtv"                          // z - Custom Alias (sm_rtv)
bind "`" "toggleconsole"                   // ` - Console Toggle
bind "," "buyammo1"                        // , - Buy Primary Ammo
bind "." "buyammo2"                        // . - Buy Secondary Ammo
bind "SEMICOLON" "+voicerecord"            // ; - Voice Record
bind "]" "incrementvar voice_enable 0 1 1" // ] - Toggle Voice On/Off
bind "[" "toggle voice_loopback"           // [ - Toggle Voice Loopback
bind "SPACE" "+jump"                       // SPACE - Jump
bind "TAB" "+showscores"                   // TAB - Scoreboard
bind "ESCAPE" "cancelselect"               // ESCAPE - Menu/Cancel
bind "DEL" "sellbackall"                   // DEL - Sell All in Buy Menu
bind "SHIFT" "+duck"                       // SHIFT - Crouch
bind "CTRL" "+speed"                       // CTRL - Walk
bind "F3" "autobuy"                        // F3 - Autobuy
bind "F4" "rebuy"                          // F4 - Rebuy
bind "F5" "jpeg"                           // F5 - Screenshot
bind "F6" "save quick"                     // F6 - Quick Save
bind "F7" "load quick"                     // F7 - Quick Load
bind "F10" "quit prompt"                   // F10 - Quit Game
bind "ENTER" "messagemode"                 // ENTER - All Chat

// KEYPAD
bind "KP_END"        "sm_b 1"              // KP 1
bind "KP_DOWNARROW"  "sm_b 2"              // KP 2
bind "KP_PGDN"       "sm_b 3"              // KP 3
bind "KP_LEFTARROW"  "sm_b 4"              // KP 4
bind "KP_5"          "sm_b 5"              // KP 5
bind "KP_RIGHTARROW" "sm_b 6"              // KP 6
bind "KP_HOME"       "sm_b 7"              // KP 7
bind "KP_UPARROW"    "sm_b 8"              // KP 8
bind "KP_PGUP"       "sm_b 9"              // KP 9

// Mouse Binds
bind "MOUSE1" "+attack"                    // Mouse 1 - Fire
bind "MOUSE2" "+attack2"                   // Mouse 2 - Alt Fire/Scope
bind "MOUSE3" "player_ping"                // Mouse 3 - Ping Location
bind "MOUSE4" "+voicerecord"               // Mouse 4 - Push to Talk
bind "MWHEELUP" "+jump"                    // Scroll Up - Jump
bind "MWHEELDOWN" "+jump"                  // Scroll Down - Jump

// Unbound Keys
bind "j" "echo KEY NOT BOUND - j"
bind "l" "echo KEY NOT BOUND - l"
bind "BACKSPACE"  "echo KEY NOT BOUND - BACKSPACE"
bind "CAPSLOCK"   "echo KEY NOT BOUND - CAPSLOCK"
bind "-"          "echo KEY NOT BOUND - MINUS"
bind "="          "echo KEY NOT BOUND - EQUALS"
bind "\\"         "echo KEY NOT BOUND - BACKSLASH"
bind "'"          "echo KEY NOT BOUND - APOSTROPHE"
bind "/"          "echo KEY NOT BOUND - SLASH"
bind "F1"         "echo KEY NOT BOUND - F1"
bind "F2"         "echo KEY NOT BOUND - F2"
bind "F8"         "echo KEY NOT BOUND - F8"
bind "F9"         "echo KEY NOT BOUND - F9"
bind "F11"        "echo KEY NOT BOUND - F11"
bind "F12"        "echo KEY NOT BOUND - F12"
bind "INS"        "echo KEY NOT BOUND - INSERT"
bind "HOME"       "echo KEY NOT BOUND - HOME"
bind "PGUP"       "echo KEY NOT BOUND - PGUP"
bind "END"        "echo KEY NOT BOUND - END"
bind "PGDN"       "echo KEY NOT BOUND - PGDN"
bind "RIGHTARROW" "echo KEY NOT BOUND - RIGHTARROW"
bind "LEFTARROW"  "echo KEY NOT BOUND - LEFTARROW"
bind "DOWNARROW"  "echo KEY NOT BOUND - DOWNARROW"
bind "UPARROW"    "echo KEY NOT BOUND - UPARROW"
bind "NUMLOCK"    "echo KEY NOT BOUND - NUMLOCK"
bind "KP_SLASH"   "echo KEY NOT BOUND - KP_SLASH"
bind "KP_MULTIPLY" "echo KEY NOT BOUND - KP_MULTIPLY"
bind "KP_MINUS"   "echo KEY NOT BOUND - KP_MINUS"
bind "KP_PLUS"    "echo KEY NOT BOUND - KP_PLUS"
bind "KP_ENTER"   "echo KEY NOT BOUND - KP_ENTER"
bind "KP_INS"     "echo KEY NOT BOUND - KP_0"
bind "KP_DEL"     "echo KEY NOT BOUND - KP_DEL"
bind "SCROLLLOCK" "echo KEY NOT BOUND - SCROLLLOCK"
bind "PAUSE"      "echo KEY NOT BOUND - PAUSE"
bind "ALT"        "echo KEY NOT BOUND - LALT"
bind "MOUSE5"     "echo KEY NOT BOUND - MOUSE5"

echo "SURF KEY BINDS CONFIG EXECUTED"
echo "SURF KEY BINDS CONFIG EXECUTED"
echo "SURF KEY BINDS CONFIG EXECUTED"
voice_enable 1
