// config_allkeys.cfg
// Only binds keys that are NOT assigned in config_default_binds.cfg or config_surf_binds.cfg.
// Press any key — if it echoes "KEY NOT BOUND" it is free to use.

// --- Letters (unbound) ---
bind "scancode13" "echo KEY NOT BOUND" // j
bind "scancode14" "echo KEY NOT BOUND" // k
bind "scancode15" "echo KEY NOT BOUND" // l
bind "scancode17" "echo KEY NOT BOUND" // n

// --- Punctuation (unbound) ---
bind "scancode45" "echo KEY NOT BOUND" // - (minus)
bind "scancode46" "echo KEY NOT BOUND" // = (equals)
bind "scancode47" "echo KEY NOT BOUND" // [ (left bracket)
bind "scancode49" "echo KEY NOT BOUND" // \ (backslash)
bind "scancode51" "echo KEY NOT BOUND" // ; (semicolon)
bind "scancode52" "echo KEY NOT BOUND" // ' (apostrophe)
bind "scancode56" "echo KEY NOT BOUND" // / (slash)

// --- Special Keys (unbound) ---
bind "BACKSPACE"  "echo KEY NOT BOUND" // BACKSPACE
bind "CAPSLOCK"   "echo KEY NOT BOUND" // CAPSLOCK

// --- Function Keys (unbound) ---
bind "F1"  "echo KEY NOT BOUND" // F1
bind "F2"  "echo KEY NOT BOUND" // F2
bind "F8"  "echo KEY NOT BOUND" // F8
bind "F9"  "echo KEY NOT BOUND" // F9
bind "F11" "echo KEY NOT BOUND" // F11
bind "F12" "echo KEY NOT BOUND" // F12

// --- Navigation (unbound) ---
bind "INS"        "echo KEY NOT BOUND" // INSERT
bind "HOME"       "echo KEY NOT BOUND" // HOME
bind "PGUP"       "echo KEY NOT BOUND" // PAGE UP
bind "END"        "echo KEY NOT BOUND" // END
bind "PGDN"       "echo KEY NOT BOUND" // PAGE DOWN
bind "UPARROW"    "echo KEY NOT BOUND" // UP ARROW
bind "DOWNARROW"  "echo KEY NOT BOUND" // DOWN ARROW
bind "LEFTARROW"  "echo KEY NOT BOUND" // LEFT ARROW
bind "RIGHTARROW" "echo KEY NOT BOUND" // RIGHT ARROW

// --- Numpad (unbound) ---
bind "scancode84" "echo KEY NOT BOUND" // KP /
bind "KP_MULTIPLY" "echo KEY NOT BOUND" // KP *
bind "KP_MINUS"    "echo KEY NOT BOUND" // KP -
bind "KP_PLUS"     "echo KEY NOT BOUND" // KP +
bind "KP_ENTER"    "echo KEY NOT BOUND" // KP ENTER
bind "KP_1"        "echo KEY NOT BOUND" // KP 1
bind "KP_2"        "echo KEY NOT BOUND" // KP 2
bind "KP_3"        "echo KEY NOT BOUND" // KP 3
bind "KP_4"        "echo KEY NOT BOUND" // KP 4
bind "KP_5"        "echo KEY NOT BOUND" // KP 5
bind "KP_6"        "echo KEY NOT BOUND" // KP 6
bind "KP_7"        "echo KEY NOT BOUND" // KP 7
bind "KP_8"        "echo KEY NOT BOUND" // KP 8
bind "KP_9"        "echo KEY NOT BOUND" // KP 9
bind "KP_0"        "echo KEY NOT BOUND" // KP 0
bind "KP_DEL"      "echo KEY NOT BOUND" // KP .

// --- Modifiers (unbound) ---
bind "scancode226" "echo KEY NOT BOUND" // LALT
bind "RSHIFT"      "echo KEY NOT BOUND" // RSHIFT
bind "RCTRL"       "echo KEY NOT BOUND" // RCTRL
bind "RALT"        "echo KEY NOT BOUND" // RALT

// --- System Keys (unbound) ---
bind "scancode70" "echo KEY NOT BOUND" // PRINT SCREEN
bind "SCROLLLOCK" "echo KEY NOT BOUND" // SCROLL LOCK
bind "PAUSE"      "echo KEY NOT BOUND" // PAUSE
bind "scancode83" "echo KEY NOT BOUND" // NUMLOCK

// --- Mouse (unbound) ---
bind "MOUSE5" "echo KEY NOT BOUND" // MOUSE5

echo "config_allkeys.cfg LOADED — press any unbound key to confirm it is free"
